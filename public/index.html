<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>IPTV Admin Panel</title>
    <!-- Bootstrap 5 + Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            background: #f4f6f9;
            font-family: 'Segoe UI', Roboto, system-ui;
        }
        /* Sidebar styles - desktop */
        .sidebar {
            background-color: #2c3e50;
            min-height: 100vh;
            transition: all 0.3s;
            box-shadow: 2px 0 5px rgba(0,0,0,0.05);
        }
        .sidebar .nav-link {
            color: #ecf0f1;
            padding: 0.8rem 1rem;
            border-radius: 8px;
            margin: 4px 8px;
            transition: 0.2s;
        }
        .sidebar .nav-link:hover {
            background-color: #1abc9c;
            color: white;
        }
        .sidebar .nav-link.active {
            background-color: #1abc9c;
            color: white;
        }
        .sidebar .nav-link i {
            width: 28px;
            text-align: center;
        }
        .brand {
            font-size: 1.5rem;
            font-weight: 600;
            padding: 1rem;
            color: white;
            border-bottom: 1px solid #3d566e;
            margin-bottom: 1rem;
        }
        /* main content */
        .main-content {
            padding: 20px;
        }
        .card-stats {
            border-left: 4px solid #1abc9c;
            transition: 0.2s;
        }
        .table-responsive {
            border-radius: 12px;
            overflow-x: auto;
        }
        /* mobile adjustments */
        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                top: 0;
                left: -260px;
                width: 260px;
                z-index: 1050;
                transition: left 0.3s;
            }
            .sidebar.show {
                left: 0;
            }
            .main-content {
                margin-left: 0 !important;
            }
            .navbar-toggler {
                display: inline-block;
            }
        }
        @media (min-width: 769px) {
            .sidebar {
                position: sticky;
                top: 0;
                width: 260px;
            }
            .navbar-toggler {
                display: none;
            }
        }
        .status-badge {
            cursor: pointer;
        }
        .modal-lg {
            max-width: 800px;
        }
    </style>
</head>
<body>
<div class="container-fluid p-0">
    <div class="row g-0">
        <!-- Sidebar -->
        <div class="col-auto sidebar" id="sidebar">
            <div class="brand">
                <i class="fas fa-tv me-2"></i> Adeel TV
            </div>
            <nav class="nav flex-column">
                <a class="nav-link active" data-section="dashboard" href="#"><i class="fas fa-tachometer-alt me-2"></i> Dashboard</a>
                <a class="nav-link" data-section="channels" href="#"><i class="fas fa-video me-2"></i> Channels</a>
                <a class="nav-link" data-section="users" href="#"><i class="fas fa-users me-2"></i> Users</a>
                <a class="nav-link" data-section="categories" href="#"><i class="fas fa-tags me-2"></i> Categories</a>
                <a class="nav-link" data-section="bouquets" href="#"><i class="fas fa-boxes me-2"></i> Bouquets</a>
                <a class="nav-link" id="logoutBtn" href="#"><i class="fas fa-sign-out-alt me-2"></i> Logout</a>
            </nav>
        </div>

        <!-- Main Content -->
        <div class="col main-content" id="mainContent">
            <!-- Top mobile navbar -->
            <nav class="navbar navbar-light bg-white rounded shadow-sm p-2 mb-3 d-block d-md-none">
                <button class="btn btn-outline-secondary" type="button" id="sidebarToggle">
                    <i class="fas fa-bars"></i> Menu
                </button>
                <span class="navbar-brand ms-2">Adeel TV Admin</span>
            </nav>

            <!-- Dynamic content panels -->
            <div id="dashboardSection">Loading...</div>
            <div id="channelsSection" style="display:none;">Loading...</div>
            <div id="usersSection" style="display:none;">Loading...</div>
            <div id="categoriesSection" style="display:none;">Loading...</div>
            <div id="bouquetsSection" style="display:none;">Loading...</div>
        </div>
    </div>
</div>

<!-- Modals: Add/Edit Channel -->
<div class="modal fade" id="channelModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header bg-dark text-white">
                <h5 class="modal-title" id="channelModalLabel">Add/Edit Channel</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="channelForm">
                    <input type="hidden" id="channelId">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label>Channel Name *</label>
                            <input type="text" class="form-control" id="channelName" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label>Stream URL *</label>
                            <input type="url" class="form-control" id="streamUrl" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label>Logo URL</label>
                            <input type="url" class="form-control" id="logoUrl">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label>Category ID</label>
                            <select class="form-control" id="categoryId"></select>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label>EPG Channel ID</label>
                            <input type="text" class="form-control" id="epgChannelId">
                        </div>
                        <div class="col-md-6 mb-3">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="adult">
                                <label class="form-check-label">Adult Content</label>
                            </div>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label>Status</label>
                            <select class="form-control" id="status">
                                <option value="Active">Active</option>
                                <option value="Inactive">Inactive</option>
                            </select>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary" id="saveChannelBtn">Save Channel</button>
            </div>
        </div>
    </div>
</div>

<!-- similarly we could add modals for users, categories, bouquets – but for brevity in this message, I'll include the JS that uses generic functions; you can extend later. For now, we'll implement channels fully, then replicate pattern -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // API base URL (same origin)
    const API_BASE = '/api';
    let currentSection = 'dashboard';

    // Helper fetch with auth token (we'll add later)
    async function apiCall(endpoint, options = {}) {
        const res = await fetch(`${API_BASE}${endpoint}`, {
            headers: { 'Content-Type': 'application/json' },
            ...options
        });
        if (!res.ok) throw new Error(await res.text());
        return res.json();
    }

    // Load dashboard stats
    async function loadDashboard() {
        try {
            const [channels, users, cats, bouqs] = await Promise.all([
                apiCall('/channels'), apiCall('/users'), apiCall('/categories'), apiCall('/bouquets')
            ]);
            const activeUsers = users.filter(u => u.status === 'Active').length;
            document.getElementById('dashboardSection').innerHTML = `
                <div class="row">
                    <div class="col-md-3 col-6 mb-3"><div class="card card-stats p-3"><h5>Channels</h5><h2>${channels.length}</h2></div></div>
                    <div class="col-md-3 col-6 mb-3"><div class="card card-stats p-3"><h5>Total Users</h5><h2>${users.length}</h2></div></div>
                    <div class="col-md-3 col-6 mb-3"><div class="card card-stats p-3"><h5>Active Users</h5><h2>${activeUsers}</h2></div></div>
                    <div class="col-md-3 col-6 mb-3"><div class="card card-stats p-3"><h5>Bouquets</h5><h2>${bouqs.length}</h2></div></div>
                </div>
                <div class="card mt-3"><div class="card-header">Recent Channels</div><div class="card-body"><ul>${channels.slice(0,5).map(c=>`<li>${c.channel_name}</li>`).join('')}</ul></div></div>
            `;
        } catch(e) { document.getElementById('dashboardSection').innerHTML = `<div class="alert alert-danger">${e.message}</div>`; }
    }

    // Channels table
    async function loadChannels() {
        const channels = await apiCall('/channels');
        const categories = await apiCall('/categories');
        const catMap = Object.fromEntries(categories.map(c=>[c.category_id, c.category_name]));
        let html = `<div class="d-flex justify-content-between mb-3"><h3>Channels</h3><button class="btn btn-primary" onclick="openChannelModal()"><i class="fas fa-plus"></i> Add Channel</button></div>
        <div class="table-responsive"><table class="table table-striped table-bordered"><thead><tr><th>ID</th><th>Name</th><th>Stream URL</th><th>Category</th><th>Adult</th><th>Status</th><th>Actions</th></tr></thead><tbody>`;
        channels.forEach(ch => {
            html += `<tr>
                <td>${ch.channel_id}</td><td>${escapeHtml(ch.channel_name)}</td><td>${truncate(ch.stream_url,40)}</td>
                <td>${catMap[ch.category_id] || ''}</td><td>${ch.adult ? 'Yes' : 'No'}</td>
                <td><span class="badge bg-${ch.status==='Active'?'success':'secondary'} status-badge" onclick="toggleChannelStatus(${ch.channel_id}, '${ch.status}')">${ch.status}</span></td>
                <td><button class="btn btn-sm btn-warning" onclick="editChannel(${ch.channel_id})"><i class="fas fa-edit"></i></button>
                <button class="btn btn-sm btn-danger" onclick="deleteChannel(${ch.channel_id})"><i class="fas fa-trash"></i></button></td>
            </tr>`;
        });
        html += `</tbody></table></div>`;
        document.getElementById('channelsSection').innerHTML = html;
        // populate category dropdown in modal
        const catSelect = document.getElementById('categoryId');
        if(catSelect) catSelect.innerHTML = categories.map(c=>`<option value="${c.category_id}">${c.category_name}</option>`).join('');
    }

    // open modal for new channel
    function openChannelModal(channel=null) {
        document.getElementById('channelForm').reset();
        document.getElementById('channelId').value = '';
        if(channel) {
            document.getElementById('channelId').value = channel.channel_id;
            document.getElementById('channelName').value = channel.channel_name;
            document.getElementById('streamUrl').value = channel.stream_url;
            document.getElementById('logoUrl').value = channel.logo_url || '';
            document.getElementById('categoryId').value = channel.category_id || '';
            document.getElementById('epgChannelId').value = channel.epg_channel_id || '';
            document.getElementById('adult').checked = channel.adult;
            document.getElementById('status').value = channel.status;
        }
        new bootstrap.Modal(document.getElementById('channelModal')).show();
    }

    async function editChannel(id) {
        const channels = await apiCall('/channels');
        const ch = channels.find(c=>c.channel_id == id);
        if(ch) openChannelModal(ch);
    }

    async function deleteChannel(id) {
        if(confirm('Delete channel?')) {
            await apiCall(`/channels/${id}`, { method: 'DELETE' });
            loadChannels();
            loadDashboard();
        }
    }

    async function toggleChannelStatus(id, current) {
        const newStatus = current === 'Active' ? 'Inactive' : 'Active';
        await apiCall(`/channels/${id}`, { method: 'PUT', body: JSON.stringify({ status: newStatus }) });
        loadChannels();
    }

    document.getElementById('saveChannelBtn')?.addEventListener('click', async () => {
        const id = document.getElementById('channelId').value;
        const payload = {
            channel_name: document.getElementById('channelName').value,
            stream_url: document.getElementById('streamUrl').value,
            logo_url: document.getElementById('logoUrl').value,
            category_id: parseInt(document.getElementById('categoryId').value) || null,
            epg_channel_id: document.getElementById('epgChannelId').value,
            adult: document.getElementById('adult').checked,
            status: document.getElementById('status').value
        };
        if(id) {
            await apiCall(`/channels/${id}`, { method: 'PUT', body: JSON.stringify(payload) });
        } else {
            await apiCall('/channels', { method: 'POST', body: JSON.stringify(payload) });
        }
        bootstrap.Modal.getInstance(document.getElementById('channelModal')).hide();
        loadChannels();
        loadDashboard();
    });

    // Helper functions
    function escapeHtml(str) { return str.replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }
    function truncate(str, len) { return str.length > len ? str.substr(0,len)+'...' : str; }

    // Navigation
    function showSection(section) {
        ['dashboard','channels','users','categories','bouquets'].forEach(s => {
            const el = document.getElementById(s+'Section');
            if(el) el.style.display = s===section ? 'block' : 'none';
        });
        if(section === 'dashboard') loadDashboard();
        if(section === 'channels') loadChannels();
        // Similar for users, categories, bouquets (will implement as needed)
        currentSection = section;
        // update active class
        document.querySelectorAll('.sidebar .nav-link').forEach(link => {
            if(link.getAttribute('data-section') === section) link.classList.add('active');
            else link.classList.remove('active');
        });
    }

    // Sidebar toggle for mobile
    document.getElementById('sidebarToggle')?.addEventListener('click', () => {
        document.getElementById('sidebar').classList.toggle('show');
    });
    document.querySelectorAll('.sidebar .nav-link').forEach(link => {
        link.addEventListener('click', (e) => {
            e.preventDefault();
            const section = link.getAttribute('data-section');
            if(section) showSection(section);
            if(window.innerWidth < 768) document.getElementById('sidebar').classList.remove('show');
        });
    });
    // Logout placeholder
    document.getElementById('logoutBtn')?.addEventListener('click', () => {
        localStorage.removeItem('token');
        window.location.href = '/login.html';
    });

    // initial load
    showSection('dashboard');
</script>
</body>
</html>
