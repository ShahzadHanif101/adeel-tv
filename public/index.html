<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Adeel TV · IPTV Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg-body: #0b0f1c;
      --bg-sidebar: #0f1322;
      --bg-card: #141a2c;
      --border: #232b3b;
      --text-primary: #f0f3fa;
      --text-secondary: #9aa4bf;
      --accent: #2bd6a1;
      --accent2: #2b7cd6;
      --accent3: #d6a42b;
      --accent4: #d65c2b;
      --radius: 14px;
      --font-sans: 'Inter', system-ui, sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
    }
    body { background: var(--bg-body); font-family: var(--font-sans); color: var(--text-primary); line-height: 1.5; }
    .admin-shell { display: flex; min-height: 100vh; }
    /* Sidebar */
    .sidebar {
      width: 280px; background: var(--bg-sidebar); border-right: 1px solid var(--border);
      display: flex; flex-direction: column; position: sticky; top: 0; height: 100vh;
      transition: transform 0.2s; z-index: 100;
    }
    .sidebar-header { padding: 24px 20px; border-bottom: 1px solid var(--border); margin-bottom: 20px; }
    .sidebar-header .logo { font-size: 1.6rem; font-weight: 700; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; background-clip: text; color: transparent; }
    .sidebar-nav { flex: 1; display: flex; flex-direction: column; gap: 6px; padding: 0 14px; }
    .sidebar-nav a {
      display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-radius: 12px;
      color: var(--text-secondary); text-decoration: none; font-weight: 500; transition: 0.2s;
    }
    .sidebar-nav a i { width: 22px; }
    .sidebar-nav a:hover, .sidebar-nav a.active { background: rgba(43,214,161,0.12); color: var(--accent); }
    /* Main */
    .main-content { flex: 1; display: flex; flex-direction: column; overflow-x: auto; }
    .topbar {
      background: var(--bg-card); border-bottom: 1px solid var(--border); padding: 14px 24px;
      display: flex; align-items: center; gap: 16px; flex-wrap: wrap; position: sticky; top: 0; z-index: 99;
    }
    .topbar-hamburger { background: none; border: none; color: var(--text-secondary); font-size: 1.3rem; cursor: pointer; display: none; }
    .topbar-title { font-weight: 600; font-size: 1.2rem; background: rgba(43,214,161,0.1); padding: 4px 12px; border-radius: 40px; color: var(--accent); }
    .topbar-spacer { flex: 1; }
    .topbar-status { display: flex; align-items: center; gap: 8px; font-size: 0.8rem; color: var(--text-secondary); }
    .status-dot { width: 8px; height: 8px; background: #2bd6a1; border-radius: 50%; box-shadow: 0 0 6px #2bd6a1; }
    .topbar-action-btn {
      background: rgba(43,214,161,0.12); border: 1px solid rgba(43,214,161,0.3); border-radius: 30px;
      padding: 8px 18px; color: var(--accent); font-size: 0.8rem; font-weight: 500; cursor: pointer;
      transition: 0.2s; display: inline-flex; align-items: center; gap: 6px;
    }
    .topbar-action-btn:hover { background: var(--accent); color: #0b0f1c; }
    .page-body { padding: 24px; max-width: 1600px; width: 100%; margin: 0 auto; }
    /* Stats cards */
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px,1fr)); gap: 20px; margin-bottom: 32px; }
    .stat-card { background: var(--bg-card); border-radius: var(--radius); border: 1px solid var(--border); padding: 20px; transition: 0.2s; }
    .stat-card:hover { transform: translateY(-2px); border-color: var(--accent); }
    .stat-icon { font-size: 1.8rem; margin-bottom: 12px; opacity: 0.7; }
    .stat-value { font-size: 2.2rem; font-weight: 700; }
    .stat-label { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-secondary); }
    .stat-sub { font-size: 0.7rem; color: var(--text-secondary); border-top: 1px dashed var(--border); padding-top: 6px; margin-top: 6px; }
    .c-cyan .stat-icon, .c-cyan .stat-value { color: #2bd6a1; }
    .c-green .stat-icon, .c-green .stat-value { color: #2b7cd6; }
    .c-yellow .stat-icon, .c-yellow .stat-value { color: #d6a42b; }
    .c-red .stat-icon, .c-red .stat-value { color: #d65c2b; }
    /* Table card */
    .table-card { background: var(--bg-card); border-radius: var(--radius); border: 1px solid var(--border); overflow: hidden; margin-bottom: 20px; }
    .table-toolbar { padding: 16px 20px; display: flex; align-items: center; border-bottom: 1px solid var(--border); gap: 12px; flex-wrap: wrap; }
    .section-title { font-weight: 600; display: flex; align-items: center; gap: 10px; }
    .title-tag { background: rgba(43,214,161,0.1); color: var(--accent); border-radius: 40px; padding: 2px 10px; font-size: 0.7rem; }
    .btn-ghost { background: none; border: 1px solid var(--border); border-radius: 30px; padding: 6px 14px; color: var(--text-secondary); font-size: 0.75rem; cursor: pointer; transition: 0.2s; }
    .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }
    .data-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    .data-table th, .data-table td { padding: 14px 16px; text-align: left; border-bottom: 1px solid var(--border); }
    .data-table th { color: var(--text-secondary); background: rgba(0,0,0,0.2); }
    .td-primary { font-weight: 500; color: white; }
    .badge { display: inline-block; padding: 4px 10px; border-radius: 40px; font-size: 0.7rem; font-weight: 500; }
    .badge-active { background: rgba(43,214,161,0.2); color: #2bd6a1; }
    .badge-expired { background: rgba(214,92,43,0.2); color: #d65c2b; }
    .badge-plan { background: rgba(255,255,255,0.05); color: var(--text-secondary); }
    .quick-links-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px,1fr)); gap: 14px; margin-top: 20px; }
    .quick-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; display: flex; align-items: center; gap: 12px; text-decoration: none; transition: 0.2s; color: var(--text-secondary); cursor: pointer; }
    .quick-card:hover { border-color: var(--accent); transform: translateY(-2px); color: var(--accent); }
    /* MODAL FIXES */
    .modal-content { background: var(--bg-card); border: 1px solid var(--border); color: var(--text-primary); border-radius: var(--radius); }
    .modal-header { border-bottom-color: var(--border); background: var(--bg-sidebar); }
    .modal-footer { border-top-color: var(--border); }
    .form-control, .form-select { background: #1e2538; border: 1px solid var(--border); color: white; }
    .form-control:focus, .form-select:focus { background: #2a3448; border-color: var(--accent); color: white; box-shadow: 0 0 0 0.25rem rgba(43,214,161,0.25); }
    .btn-close { filter: invert(1); }
    @media (max-width: 768px) {
      .sidebar { position: fixed; left: -280px; transition: left 0.2s; height: 100%; z-index: 1000; }
      .sidebar.open { left: 0; }
      .topbar-hamburger { display: block; }
      .page-body { padding: 16px; }
      .data-table th, .data-table td { padding: 10px 12px; }
    }
  </style>
</head>
<body>
<div class="admin-shell">
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header"><div class="logo">📡 Adeel TV</div></div>
    <div class="sidebar-nav">
      <a href="#" data-section="dashboard" class="active"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
      <a href="#" data-section="channels"><i class="fas fa-video"></i> Channels</a>
      <a href="#" data-section="users"><i class="fas fa-users"></i> Users</a>
      <a href="#" data-section="categories"><i class="fas fa-tags"></i> Categories</a>
      <a href="#" data-section="bouquets"><i class="fas fa-boxes"></i> Bouquets</a>
      <a href="#" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</a>
    </div>
  </div>
  <div class="main-content">
    <div class="topbar">
      <button class="topbar-hamburger" id="hamburgerBtn"><i class="fas fa-bars"></i></button>
      <span class="topbar-title" id="currentPageTitle">Dashboard</span>
      <span class="topbar-spacer"></span>
      <div class="topbar-status"><span class="status-dot"></span> System Online</div>
      <button id="quickAddBtn" class="topbar-action-btn" style="display:none"><i class="fas fa-plus"></i> Add</button>
    </div>
    <div class="page-body" id="pageBody">Loading...</div>
  </div>
</div>

<!-- MODALS (all CRUD) -->
<div class="modal fade" id="channelModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-lg modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header"><h5 class="modal-title">Add/Edit Channel</h5><button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button></div>
      <div class="modal-body">
        <form id="channelForm"><input type="hidden" id="channelId">
          <div class="row"><div class="col-md-6 mb-3"><label>Channel Name *</label><input type="text" class="form-control" id="channelName" required></div>
          <div class="col-md-6 mb-3"><label>Stream URL *</label><input type="url" class="form-control" id="streamUrl" required></div>
          <div class="col-md-6 mb-3"><label>Logo URL</label><input type="url" class="form-control" id="logoUrl" placeholder="Auto-filled if empty"></div>
          <div class="col-md-6 mb-3"><label>Category</label><select class="form-select" id="categoryId"></select></div>
          <div class="col-md-6 mb-3"><label>EPG Channel ID</label><input type="text" class="form-control" id="epgChannelId"></div>
          <div class="col-md-6 mb-3"><div class="form-check"><input class="form-check-input" type="checkbox" id="adult"><label class="form-check-label">Adult Content</label></div></div>
          <div class="col-md-6 mb-3"><label>Status</label><select class="form-select" id="status"><option value="Active">Active</option><option value="Inactive">Inactive</option></select></div></div>
        </form>
      </div>
      <div class="modal-footer"><button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button><button type="button" class="btn btn-primary" id="saveChannelBtn">Save Channel</button></div>
    </div>
  </div>
</div>

<div class="modal fade" id="userModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header"><h5 class="modal-title">Add/Edit User</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
      <div class="modal-body"><form id="userForm"><input type="hidden" id="userId">
        <div class="mb-3"><label>Username</label><input type="text" class="form-control" id="username" required></div>
        <div class="mb-3"><label>Password (leave blank to keep unchanged)</label><input type="password" class="form-control" id="password"></div>
        <div class="mb-3"><label>Email</label><input type="email" class="form-control" id="email"></div>
        <div class="mb-3"><label>Bouquet ID</label><input type="number" class="form-control" id="bouquetId"></div>
        <div class="mb-3"><label>Expiry Date</label><input type="datetime-local" class="form-control" id="expiryDate"></div>
        <div class="mb-3"><label>Max Connections</label><input type="number" class="form-control" id="maxConnections" value="1"></div>
        <div class="mb-3"><label>Status</label><select class="form-select" id="userStatus"><option value="Active">Active</option><option value="Banned">Banned</option><option value="Disabled">Disabled</option></select></div>
      </form></div>
      <div class="modal-footer"><button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button><button type="button" class="btn btn-primary" id="saveUserBtn">Save User</button></div>
    </div>
  </div>
</div>

<div class="modal fade" id="categoryModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header"><h5 class="modal-title">Add/Edit Category</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
      <div class="modal-body"><form id="categoryForm"><input type="hidden" id="categoryId">
        <div class="mb-3"><label>Category Name</label><input type="text" class="form-control" id="categoryName" required></div>
        <div class="mb-3"><label>Parent ID (0 for top)</label><input type="number" class="form-control" id="parentId" value="0"></div>
      </form></div>
      <div class="modal-footer"><button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button><button type="button" class="btn btn-primary" id="saveCategoryBtn">Save Category</button></div>
    </div>
  </div>
</div>

<div class="modal fade" id="bouquetModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header"><h5 class="modal-title">Add/Edit Bouquet</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
      <div class="modal-body"><form id="bouquetForm"><input type="hidden" id="bouquetId">
        <div class="mb-3"><label>Bouquet Name</label><input type="text" class="form-control" id="bouquetName" required></div>
        <div class="mb-3"><label>Days</label><input type="number" class="form-control" id="days" required></div>
        <div class="mb-3"><label>Max Streams</label><input type="number" class="form-control" id="maxStreams" value="1"></div>
        <div class="mb-3"><label>Price</label><input type="number" step="0.01" class="form-control" id="price" value="0"></div>
      </form></div>
      <div class="modal-footer"><button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button><button type="button" class="btn btn-primary" id="saveBouquetBtn">Save Bouquet</button></div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
<script>
  const API_BASE = '/api';
  let categoriesCache = [];

  async function apiCall(endpoint, options = {}) {
    const res = await fetch(`${API_BASE}${endpoint}`, {
      headers: { 'Content-Type': 'application/json' },
      ...options
    });
    if (!res.ok) throw new Error(await res.text());
    return res.json();
  }
  function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }
  function truncate(str, len) { return str && str.length > len ? str.substr(0,len)+'...' : (str||''); }
  const DEFAULT_LOGO = "https://github.com/ShahzadHanif101/images/blob/main/ShazIPTV.png?raw=true";

  // Dashboard
  async function loadDashboard() {
    try {
      const [channels, users, cats, bouqs] = await Promise.all([
        apiCall('/channels'), apiCall('/users'), apiCall('/categories'), apiCall('/bouquets')
      ]);
      const activeUsers = users.filter(u => u.status === 'Active').length;
      const trialUsers = users.filter(u => u.bouquet_id === 1).length;
      const expiringSoon = users.filter(u => u.expiry_date && (new Date(u.expiry_date) - new Date()) < 3*86400000 && (new Date(u.expiry_date) - new Date()) > 0).length;
      const expiredUsers = users.filter(u => u.expiry_date && new Date(u.expiry_date) < new Date()).length;
      document.getElementById('pageBody').innerHTML = `
        <div class="stats-grid">
          <div class="stat-card c-cyan"><div class="stat-icon"><i class="fas fa-users"></i></div><div class="stat-value">${users.length}</div><div class="stat-label">Total Users</div><div class="stat-sub">${activeUsers} active · ${trialUsers} trial</div></div>
          <div class="stat-card c-green"><div class="stat-icon"><i class="fas fa-tv"></i></div><div class="stat-value">${channels.length}</div><div class="stat-label">Live Channels</div><div class="stat-sub">${cats.length} categories</div></div>
          <div class="stat-card c-yellow"><div class="stat-icon"><i class="fas fa-hourglass-half"></i></div><div class="stat-value">${expiringSoon}</div><div class="stat-label">Expiring Soon</div><div class="stat-sub">Within next 3 days</div></div>
          <div class="stat-card c-red"><div class="stat-icon"><i class="fas fa-calendar-times"></i></div><div class="stat-value">${expiredUsers}</div><div class="stat-label">Expired Users</div><div class="stat-sub">Require renewal</div></div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px">
          <div class="table-card"><div class="table-toolbar"><div class="section-title">Recent Users <span class="title-tag">${Math.min(users.length,5)}</span></div><span class="topbar-spacer"></span><button class="btn-ghost btn-sm" onclick="switchSection('users')">View all</button></div>
            <table class="data-table"><thead><tr><th>User</th><th>Plan</th><th>Expires</th><th>Status</th></tr></thead><tbody>${users.slice(0,5).map(u => { const expired = u.expiry_date && new Date(u.expiry_date) < new Date(); const statusClass = expired ? 'badge-expired' : (u.status==='Active' ? 'badge-active' : 'badge-expired'); const statusText = expired ? 'Expired' : u.status; return `<tr><td class="td-primary">${escapeHtml(u.username)}</td><td><span class="badge badge-plan">${u.bouquet_id||'-'}</span></td><td>${u.expiry_date ? new Date(u.expiry_date).toLocaleDateString() : 'Never'}</td><td><span class="badge ${statusClass}">${statusText}</span></td></tr>`; }).join('')}</tbody></table></div>
          <div class="table-card"><div class="table-toolbar"><div class="section-title">Expiring Soon <span class="title-tag">${expiringSoon}</span></div><span class="topbar-spacer"></span><button class="btn-ghost btn-sm" onclick="switchSection('users')">Manage</button></div>
            <table class="data-table"><thead><tr><th>User</th><th>Plan</th><th>Expires</th></tr></thead><tbody>${users.filter(u => u.expiry_date && (new Date(u.expiry_date) - new Date()) < 3*86400000 && (new Date(u.expiry_date) - new Date()) > 0).map(u => `<tr><td class="td-primary">${escapeHtml(u.username)}</td><td><span class="badge badge-plan">${u.bouquet_id||'-'}</span></td><td class="text-warn">${new Date(u.expiry_date).toLocaleDateString()} (${Math.ceil((new Date(u.expiry_date)-new Date())/86400000)} days)</td></tr>`).join('')}</tbody></table></div>
        </div>
        <div class="quick-links-grid">
          <button class="quick-card" onclick="switchSection('channels')"><span>📺</span> Manage Channels</button>
          <button class="quick-card" onclick="openUserModal()"><span>👤</span> Add User</button>
          <button class="quick-card" onclick="switchSection('categories')"><span>📁</span> Categories</button>
          <button class="quick-card" onclick="switchSection('bouquets')"><span>📦</span> Bouquet Plans</button>
        </div>
      `;
    } catch(e) { document.getElementById('pageBody').innerHTML = `<div class="alert alert-danger">${e.message}</div>`; }
  }

  // Channels
  async function loadChannels() {
    const channels = await apiCall('/channels');
    const categories = await apiCall('/categories');
    categoriesCache = categories;
    const catMap = Object.fromEntries(categories.map(c=>[c.category_id, c.category_name]));
    let html = `<div class="table-card"><div class="table-toolbar"><div class="section-title">All Channels <span class="title-tag">${channels.length}</span></div><span class="topbar-spacer"></span><button class="btn-ghost" onclick="openChannelModal()"><i class="fas fa-plus"></i> Add Channel</button></div>
      <div style="overflow-x:auto"><table class="data-table"><thead><tr><th>ID</th><th>Name</th><th>Stream URL</th><th>Category</th><th>Adult</th><th>Status</th><th>Actions</th></tr></thead><tbody>`;
    channels.forEach(ch => {
      html += `<tr><td>${ch.channel_id}</td><td class="td-primary">${escapeHtml(ch.channel_name)}</td><td>${truncate(ch.stream_url,40)}</td><td>${catMap[ch.category_id] || '-'}</td><td>${ch.adult ? 'Yes' : 'No'}</td>
        <td><span class="badge ${ch.status==='Active'?'badge-active':'badge-expired'}" style="cursor:pointer" onclick="toggleChannelStatus(${ch.channel_id}, '${ch.status}')">${ch.status}</span></td>
        <td><button class="btn-ghost btn-sm" onclick="editChannel(${ch.channel_id})"><i class="fas fa-edit"></i></button> <button class="btn-ghost btn-sm" onclick="deleteChannel(${ch.channel_id})"><i class="fas fa-trash"></i></button></td></tr>`;
    });
    html += `</tbody></table></div></div>`;
    document.getElementById('pageBody').innerHTML = html;
  }
  window.openChannelModal = function(channel=null) {
    const catSelect = document.getElementById('categoryId');
    if(catSelect && categoriesCache.length) catSelect.innerHTML = categoriesCache.map(c=>`<option value="${c.category_id}">${escapeHtml(c.category_name)}</option>`).join('');
    document.getElementById('channelForm').reset();
    document.getElementById('channelId').value = '';
    if(channel) {
      document.getElementById('channelId').value = channel.channel_id;
      document.getElementById('channelName').value = channel.channel_name;
      document.getElementById('streamUrl').value = channel.stream_url;
      document.getElementById('logoUrl').value = channel.logo_url || '';
      document.getElementById('categoryId').value = channel.category_id || '';
      document.getElementById('epgChannelId').value = channel.epg_channel_id || '';
      document.getElementById('adult').checked = channel.adult;
      document.getElementById('status').value = channel.status;
    } else {
      document.getElementById('logoUrl').value = DEFAULT_LOGO;
    }
    new bootstrap.Modal(document.getElementById('channelModal')).show();
  };
  window.editChannel = async function(id) {
    const channels = await apiCall('/channels');
    const ch = channels.find(c=>c.channel_id == id);
    if(ch) openChannelModal(ch);
  };
  window.deleteChannel = async function(id) {
    if(confirm('Delete channel?')) { await apiCall(`/channels/${id}`, { method: 'DELETE' }); loadChannels(); loadDashboard(); }
  };
  window.toggleChannelStatus = async function(id, current) {
    const newStatus = current === 'Active' ? 'Inactive' : 'Active';
    await apiCall(`/channels/${id}`, { method: 'PUT', body: JSON.stringify({ status: newStatus }) });
    loadChannels();
  };
  document.getElementById('saveChannelBtn')?.addEventListener('click', async () => {
    const id = document.getElementById('channelId').value;
    let logo = document.getElementById('logoUrl').value;
    if(!logo.trim()) logo = DEFAULT_LOGO;
    const payload = {
      channel_name: document.getElementById('channelName').value,
      stream_url: document.getElementById('streamUrl').value,
      logo_url: logo,
      category_id: parseInt(document.getElementById('categoryId').value) || null,
      epg_channel_id: document.getElementById('epgChannelId').value,
      adult: document.getElementById('adult').checked,
      status: document.getElementById('status').value
    };
    if(id) await apiCall(`/channels/${id}`, { method: 'PUT', body: JSON.stringify(payload) });
    else await apiCall('/channels', { method: 'POST', body: JSON.stringify(payload) });
    bootstrap.Modal.getInstance(document.getElementById('channelModal')).hide();
    loadChannels(); loadDashboard();
  });

  // Users (similar to previous, fully working)
  async function loadUsers() {
    const users = await apiCall('/users');
    let html = `<div class="table-card"><div class="table-toolbar"><div class="section-title">User Management</div><span class="topbar-spacer"></span><button class="btn-ghost" onclick="openUserModal()"><i class="fas fa-plus"></i> Add User</button></div>
      <div style="overflow-x:auto"><table class="data-table"><thead><tr><th>ID</th><th>Username</th><th>Email</th><th>Bouquet ID</th><th>Expiry</th><th>Max Conn</th><th>Status</th><th>Actions</th></tr></thead><tbody>`;
    users.forEach(u => {
      html += `<tr><td>${u.user_id}</td><td class="td-primary">${escapeHtml(u.username)}</td><td>${escapeHtml(u.email||'')}</td><td>${u.bouquet_id||''}</td><td>${u.expiry_date ? new Date(u.expiry_date).toLocaleDateString() : 'Never'}</td><td>${u.max_connections}</td>
        <td><span class="badge ${u.status==='Active'?'badge-active':u.status==='Banned'?'badge-expired':'badge-expired'}" style="cursor:pointer" onclick="toggleUserStatus(${u.user_id}, '${u.status}')">${u.status}</span></td>
        <td><button class="btn-ghost btn-sm" onclick="editUser(${u.user_id})"><i class="fas fa-edit"></i></button> <button class="btn-ghost btn-sm" onclick="deleteUser(${u.user_id})"><i class="fas fa-trash"></i></button></td></tr>`;
    });
    html += `</tbody></table></div></div>`;
    document.getElementById('pageBody').innerHTML = html;
  }
  window.openUserModal = function(user=null) {
    document.getElementById('userForm').reset();
    document.getElementById('userId').value = '';
    document.getElementById('password').value = '';
    if(user) {
      document.getElementById('userId').value = user.user_id;
      document.getElementById('username').value = user.username;
      document.getElementById('email').value = user.email||'';
      document.getElementById('bouquetId').value = user.bouquet_id||'';
      if(user.expiry_date) {
        let d = new Date(user.expiry_date);
        let local = new Date(d.getTime() - d.getTimezoneOffset()*60000).toISOString().slice(0,16);
        document.getElementById('expiryDate').value = local;
      }
      document.getElementById('maxConnections').value = user.max_connections;
      document.getElementById('userStatus').value = user.status;
    } else {
      let defaultExpiry = new Date(Date.now() + 30*24*60*60*1000);
      let localExpiry = new Date(defaultExpiry.getTime() - defaultExpiry.getTimezoneOffset()*60000).toISOString().slice(0,16);
      document.getElementById('expiryDate').value = localExpiry;
    }
    new bootstrap.Modal(document.getElementById('userModal')).show();
  };
  window.editUser = async function(id) {
    const users = await apiCall('/users');
    const u = users.find(u=>u.user_id == id);
    if(u) openUserModal(u);
  };
  window.deleteUser = async function(id) {
    if(confirm('Delete user?')) { await apiCall(`/users/${id}`, { method: 'DELETE' }); loadUsers(); loadDashboard(); }
  };
  window.toggleUserStatus = async function(id, current) {
    let newStatus = current === 'Active' ? 'Banned' : (current === 'Banned' ? 'Active' : 'Active');
    await apiCall(`/users/${id}`, { method: 'PUT', body: JSON.stringify({ status: newStatus }) });
    loadUsers(); loadDashboard();
  };
  document.getElementById('saveUserBtn')?.addEventListener('click', async () => {
    const id = document.getElementById('userId').value;
    const payload = {
      username: document.getElementById('username').value,
      email: document.getElementById('email').value,
      bouquet_id: parseInt(document.getElementById('bouquetId').value) || null,
      expiry_date: document.getElementById('expiryDate').value ? new Date(document.getElementById('expiryDate').value).toISOString() : null,
      max_connections: parseInt(document.getElementById('maxConnections').value),
      status: document.getElementById('userStatus').value
    };
    const password = document.getElementById('password').value;
    if(password) payload.password = password;
    if(id) await apiCall(`/users/${id}`, { method: 'PUT', body: JSON.stringify(payload) });
    else await apiCall('/users', { method: 'POST', body: JSON.stringify(payload) });
    bootstrap.Modal.getInstance(document.getElementById('userModal')).hide();
    loadUsers(); loadDashboard();
  });

  // Categories & Bouquets (short, full CRUD)
  async function loadCategories() {
    const cats = await apiCall('/categories');
    let html = `<div class="table-card"><div class="table-toolbar"><div class="section-title">Categories</div><span class="topbar-spacer"></span><button class="btn-ghost" onclick="openCategoryModal()"><i class="fas fa-plus"></i> Add Category</button></div>
      <div style="overflow-x:auto"><table class="data-table"><thead><tr><th>ID</th><th>Name</th><th>Parent ID</th><th>Actions</th></tr></thead><tbody>`;
    cats.forEach(c => {
      html += `<tr><td>${c.category_id}</td><td class="td-primary">${escapeHtml(c.category_name)}</td><td>${c.parent_id}</td><td><button class="btn-ghost btn-sm" onclick="editCategory(${c.category_id})"><i class="fas fa-edit"></i></button> <button class="btn-ghost btn-sm" onclick="deleteCategory(${c.category_id})"><i class="fas fa-trash"></i></button></td></tr>`;
    });
    html += `</tbody></table></div></div>`;
    document.getElementById('pageBody').innerHTML = html;
  }
  window.openCategoryModal = function(cat=null) {
    document.getElementById('categoryForm').reset();
    document.getElementById('categoryId').value = '';
    if(cat) {
      document.getElementById('categoryId').value = cat.category_id;
      document.getElementById('categoryName').value = cat.category_name;
      document.getElementById('parentId').value = cat.parent_id;
    }
    new bootstrap.Modal(document.getElementById('categoryModal')).show();
  };
  window.editCategory = async function(id) {
    const cats = await apiCall('/categories');
    const cat = cats.find(c=>c.category_id == id);
    if(cat) openCategoryModal(cat);
  };
  window.deleteCategory = async function(id) {
    if(confirm('Delete category?')) { await apiCall(`/categories/${id}`, { method: 'DELETE' }); loadCategories(); loadDashboard(); }
  };
  document.getElementById('saveCategoryBtn')?.addEventListener('click', async () => {
    const id = document.getElementById('categoryId').value;
    const payload = { category_name: document.getElementById('categoryName').value, parent_id: parseInt(document.getElementById('parentId').value) || 0 };
    if(id) await apiCall(`/categories/${id}`, { method: 'PUT', body: JSON.stringify(payload) });
    else await apiCall('/categories', { method: 'POST', body: JSON.stringify(payload) });
    bootstrap.Modal.getInstance(document.getElementById('categoryModal')).hide();
    loadCategories(); loadDashboard();
  });

  async function loadBouquets() {
    const bouqs = await apiCall('/bouquets');
    let html = `<div class="table-card"><div class="table-toolbar"><div class="section-title">Bouquets</div><span class="topbar-spacer"></span><button class="btn-ghost" onclick="openBouquetModal()"><i class="fas fa-plus"></i> Add Bouquet</button></div>
      <div style="overflow-x:auto"><table class="data-table"><thead><tr><th>ID</th><th>Name</th><th>Days</th><th>Max Streams</th><th>Price</th><th>Actions</th></tr></thead><tbody>`;
    bouqs.forEach(b => {
      html += `<tr><td>${b.bouquet_id}</td><td class="td-primary">${escapeHtml(b.bouquet_name)}</td><td>${b.days}</td><td>${b.max_streams}</td><td>$${b.price}</td><td><button class="btn-ghost btn-sm" onclick="editBouquet(${b.bouquet_id})"><i class="fas fa-edit"></i></button> <button class="btn-ghost btn-sm" onclick="deleteBouquet(${b.bouquet_id})"><i class="fas fa-trash"></i></button></td></tr>`;
    });
    html += `</tbody></table></div></div>`;
    document.getElementById('pageBody').innerHTML = html;
  }
  window.openBouquetModal = function(bouq=null) {
    document.getElementById('bouquetForm').reset();
    document.getElementById('bouquetId').value = '';
    if(bouq) {
      document.getElementById('bouquetId').value = bouq.bouquet_id;
      document.getElementById('bouquetName').value = bouq.bouquet_name;
      document.getElementById('days').value = bouq.days;
      document.getElementById('maxStreams').value = bouq.max_streams;
      document.getElementById('price').value = bouq.price;
    }
    new bootstrap.Modal(document.getElementById('bouquetModal')).show();
  };
  window.editBouquet = async function(id) {
    const bouqs = await apiCall('/bouquets');
    const b = bouqs.find(b=>b.bouquet_id == id);
    if(b) openBouquetModal(b);
  };
  window.deleteBouquet = async function(id) {
    if(confirm('Delete bouquet?')) { await apiCall(`/bouquets/${id}`, { method: 'DELETE' }); loadBouquets(); loadDashboard(); }
  };
  document.getElementById('saveBouquetBtn')?.addEventListener('click', async () => {
    const id = document.getElementById('bouquetId').value;
    const payload = {
      bouquet_name: document.getElementById('bouquetName').value,
      days: parseInt(document.getElementById('days').value),
      max_streams: parseInt(document.getElementById('maxStreams').value),
      price: parseFloat(document.getElementById('price').value)
    };
    if(id) await apiCall(`/bouquets/${id}`, { method: 'PUT', body: JSON.stringify(payload) });
    else await apiCall('/bouquets', { method: 'POST', body: JSON.stringify(payload) });
    bootstrap.Modal.getInstance(document.getElementById('bouquetModal')).hide();
    loadBouquets(); loadDashboard();
  });

  // Navigation
  window.switchSection = function(section) {
    document.querySelectorAll('.sidebar-nav a').forEach(a => a.classList.remove('active'));
    document.querySelector(`.sidebar-nav a[data-section="${section}"]`)?.classList.add('active');
    document.getElementById('currentPageTitle').innerText = section.charAt(0).toUpperCase() + section.slice(1);
    const quickBtn = document.getElementById('quickAddBtn');
    if(section === 'channels') { quickBtn.style.display = 'inline-flex'; quickBtn.onclick = () => openChannelModal(); quickBtn.innerHTML = '<i class="fas fa-plus"></i> Add Channel'; }
    else if(section === 'users') { quickBtn.style.display = 'inline-flex'; quickBtn.onclick = () => openUserModal(); quickBtn.innerHTML = '<i class="fas fa-plus"></i> Add User'; }
    else if(section === 'categories') { quickBtn.style.display = 'inline-flex'; quickBtn.onclick = () => openCategoryModal(); quickBtn.innerHTML = '<i class="fas fa-plus"></i> Add Category'; }
    else if(section === 'bouquets') { quickBtn.style.display = 'inline-flex'; quickBtn.onclick = () => openBouquetModal(); quickBtn.innerHTML = '<i class="fas fa-plus"></i> Add Bouquet'; }
    else { quickBtn.style.display = 'none'; }
    if(section === 'dashboard') loadDashboard();
    else if(section === 'channels') loadChannels();
    else if(section === 'users') loadUsers();
    else if(section === 'categories') loadCategories();
    else if(section === 'bouquets') loadBouquets();
    if(window.innerWidth < 768) document.getElementById('sidebar').classList.remove('open');
  };

  document.getElementById('hamburgerBtn').onclick = () => document.getElementById('sidebar').classList.toggle('open');
  document.querySelectorAll('.sidebar-nav a[data-section]').forEach(link => {
    link.onclick = (e) => { e.preventDefault(); switchSection(link.getAttribute('data-section')); };
  });
  document.getElementById('logoutBtn').onclick = () => alert('Logout not attached to Supabase Auth yet.');
  switchSection('dashboard');
</script>
</body>
</html>
