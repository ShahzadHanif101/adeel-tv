<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>IPTV Admin Panel</title>
    <!-- Bootstrap 5 + Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #f4f6f9; font-family: 'Segoe UI', Roboto, system-ui; }
        .sidebar { background-color: #2c3e50; min-height: 100vh; transition: all 0.3s; box-shadow: 2px 0 5px rgba(0,0,0,0.05); }
        .sidebar .nav-link { color: #ecf0f1; padding: 0.8rem 1rem; border-radius: 8px; margin: 4px 8px; transition: 0.2s; }
        .sidebar .nav-link:hover, .sidebar .nav-link.active { background-color: #1abc9c; color: white; }
        .sidebar .nav-link i { width: 28px; text-align: center; }
        .brand { font-size: 1.5rem; font-weight: 600; padding: 1rem; color: white; border-bottom: 1px solid #3d566e; margin-bottom: 1rem; }
        .main-content { padding: 20px; }
        .card-stats { border-left: 4px solid #1abc9c; transition: 0.2s; }
        .table-responsive { border-radius: 12px; overflow-x: auto; }
        @media (max-width: 768px) {
            .sidebar { position: fixed; top: 0; left: -260px; width: 260px; z-index: 1050; transition: left 0.3s; }
            .sidebar.show { left: 0; }
            .main-content { margin-left: 0 !important; }
            .navbar-toggler { display: inline-block; }
        }
        @media (min-width: 769px) {
            .sidebar { position: sticky; top: 0; width: 260px; }
            .navbar-toggler { display: none; }
        }
        .status-badge { cursor: pointer; }
        .modal-lg { max-width: 800px; }
    </style>
</head>
<body>
<div class="container-fluid p-0">
    <div class="row g-0">
        <!-- Sidebar -->
        <div class="col-auto sidebar" id="sidebar">
            <div class="brand"><i class="fas fa-tv me-2"></i> Adeel TV</div>
            <nav class="nav flex-column">
                <a class="nav-link active" data-section="dashboard" href="#"><i class="fas fa-tachometer-alt me-2"></i> Dashboard</a>
                <a class="nav-link" data-section="channels" href="#"><i class="fas fa-video me-2"></i> Channels</a>
                <a class="nav-link" data-section="users" href="#"><i class="fas fa-users me-2"></i> Users</a>
                <a class="nav-link" data-section="categories" href="#"><i class="fas fa-tags me-2"></i> Categories</a>
                <a class="nav-link" data-section="bouquets" href="#"><i class="fas fa-boxes me-2"></i> Bouquets</a>
                <a class="nav-link" id="logoutBtn" href="#"><i class="fas fa-sign-out-alt me-2"></i> Logout</a>
            </nav>
        </div>

        <!-- Main Content -->
        <div class="col main-content" id="mainContent">
            <nav class="navbar navbar-light bg-white rounded shadow-sm p-2 mb-3 d-block d-md-none">
                <button class="btn btn-outline-secondary" type="button" id="sidebarToggle"><i class="fas fa-bars"></i> Menu</button>
                <span class="navbar-brand ms-2">Adeel TV Admin</span>
            </nav>
            <div id="dashboardSection">Loading...</div>
            <div id="channelsSection" style="display:none;">Loading...</div>
            <div id="usersSection" style="display:none;">Loading...</div>
            <div id="categoriesSection" style="display:none;">Loading...</div>
            <div id="bouquetsSection" style="display:none;">Loading...</div>
        </div>
    </div>
</div>

<!-- Channel Modal -->
<div class="modal fade" id="channelModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header bg-dark text-white"><h5 class="modal-title">Add/Edit Channel</h5><button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button></div>
            <div class="modal-body">
                <form id="channelForm">
                    <input type="hidden" id="channelId">
                    <div class="row">
                        <div class="col-md-6 mb-3"><label>Channel Name *</label><input type="text" class="form-control" id="channelName" required></div>
                        <div class="col-md-6 mb-3"><label>Stream URL *</label><input type="url" class="form-control" id="streamUrl" required></div>
                        <div class="col-md-6 mb-3"><label>Logo URL</label><input type="url" class="form-control" id="logoUrl"></div>
                        <div class="col-md-6 mb-3"><label>Category ID</label><select class="form-control" id="categoryId"></select></div>
                        <div class="col-md-6 mb-3"><label>EPG Channel ID</label><input type="text" class="form-control" id="epgChannelId"></div>
                        <div class="col-md-6 mb-3"><div class="form-check"><input class="form-check-input" type="checkbox" id="adult"><label class="form-check-label">Adult Content</label></div></div>
                        <div class="col-md-6 mb-3"><label>Status</label><select class="form-control" id="status"><option value="Active">Active</option><option value="Inactive">Inactive</option></select></div>
                    </div>
                </form>
            </div>
            <div class="modal-footer"><button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button><button type="button" class="btn btn-primary" id="saveChannelBtn">Save Channel</button></div>
        </div>
    </div>
</div>

<!-- User Modal -->
<div class="modal fade" id="userModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header bg-dark text-white"><h5 class="modal-title">Add/Edit User</h5><button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button></div>
            <div class="modal-body">
                <form id="userForm">
                    <input type="hidden" id="userId">
                    <div class="mb-3"><label>Username</label><input type="text" class="form-control" id="username" required></div>
                    <div class="mb-3"><label>Password (leave blank to keep unchanged)</label><input type="password" class="form-control" id="password"></div>
                    <div class="mb-3"><label>Email</label><input type="email" class="form-control" id="email"></div>
                    <div class="mb-3"><label>Bouquet ID</label><input type="number" class="form-control" id="bouquetId"></div>
                    <div class="mb-3"><label>Expiry Date</label><input type="datetime-local" class="form-control" id="expiryDate"></div>
                    <div class="mb-3"><label>Max Connections</label><input type="number" class="form-control" id="maxConnections" value="1"></div>
                    <div class="mb-3"><label>Status</label><select class="form-control" id="userStatus"><option value="Active">Active</option><option value="Banned">Banned</option><option value="Disabled">Disabled</option></select></div>
                </form>
            </div>
            <div class="modal-footer"><button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button><button type="button" class="btn btn-primary" id="saveUserBtn">Save User</button></div>
        </div>
    </div>
</div>

<!-- Category Modal -->
<div class="modal fade" id="categoryModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header bg-dark text-white"><h5 class="modal-title">Add/Edit Category</h5><button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button></div>
            <div class="modal-body">
                <form id="categoryForm">
                    <input type="hidden" id="categoryId">
                    <div class="mb-3"><label>Category Name</label><input type="text" class="form-control" id="categoryName" required></div>
                    <div class="mb-3"><label>Parent ID (0 for top)</label><input type="number" class="form-control" id="parentId" value="0"></div>
                </form>
            </div>
            <div class="modal-footer"><button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button><button type="button" class="btn btn-primary" id="saveCategoryBtn">Save Category</button></div>
        </div>
    </div>
</div>

<!-- Bouquet Modal -->
<div class="modal fade" id="bouquetModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header bg-dark text-white"><h5 class="modal-title">Add/Edit Bouquet</h5><button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button></div>
            <div class="modal-body">
                <form id="bouquetForm">
                    <input type="hidden" id="bouquetId">
                    <div class="mb-3"><label>Bouquet Name</label><input type="text" class="form-control" id="bouquetName" required></div>
                    <div class="mb-3"><label>Days</label><input type="number" class="form-control" id="days" required></div>
                    <div class="mb-3"><label>Max Streams</label><input type="number" class="form-control" id="maxStreams" value="1"></div>
                    <div class="mb-3"><label>Price</label><input type="number" step="0.01" class="form-control" id="price" value="0"></div>
                </form>
            </div>
            <div class="modal-footer"><button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button><button type="button" class="btn btn-primary" id="saveBouquetBtn">Save Bouquet</button></div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const API_BASE = '/api';
    let currentSection = 'dashboard';

    async function apiCall(endpoint, options = {}) {
        const res = await fetch(`${API_BASE}${endpoint}`, {
            headers: { 'Content-Type': 'application/json' },
            ...options
        });
        if (!res.ok) throw new Error(await res.text());
        return res.json();
    }

    function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }
    function truncate(str, len) { return str && str.length > len ? str.substr(0,len)+'...' : (str||''); }

    // ---------- DASHBOARD ----------
    async function loadDashboard() {
        try {
            const [channels, users, cats, bouqs] = await Promise.all([
                apiCall('/channels'), apiCall('/users'), apiCall('/categories'), apiCall('/bouquets')
            ]);
            const activeUsers = users.filter(u => u.status === 'Active').length;
            document.getElementById('dashboardSection').innerHTML = `
                <div class="row">
                    <div class="col-md-3 col-6 mb-3"><div class="card card-stats p-3"><h5>Channels</h5><h2>${channels.length}</h2></div></div>
                    <div class="col-md-3 col-6 mb-3"><div class="card card-stats p-3"><h5>Total Users</h5><h2>${users.length}</h2></div></div>
                    <div class="col-md-3 col-6 mb-3"><div class="card card-stats p-3"><h5>Active Users</h5><h2>${activeUsers}</h2></div></div>
                    <div class="col-md-3 col-6 mb-3"><div class="card card-stats p-3"><h5>Bouquets</h5><h2>${bouqs.length}</h2></div></div>
                </div>
                <div class="card mt-3"><div class="card-header">Recent Channels</div><div class="card-body"><ul>${channels.slice(0,5).map(c=>`<li>${escapeHtml(c.channel_name)}</li>`).join('')}</ul></div></div>
            `;
        } catch(e) { document.getElementById('dashboardSection').innerHTML = `<div class="alert alert-danger">${e.message}</div>`; }
    }

    // ---------- CHANNELS ----------
    async function loadChannels() {
        const channels = await apiCall('/channels');
        const categories = await apiCall('/categories');
        const catMap = Object.fromEntries(categories.map(c=>[c.category_id, c.category_name]));
        let html = `<div class="d-flex justify-content-between mb-3"><h3>Channels</h3><button class="btn btn-primary" onclick="openChannelModal()"><i class="fas fa-plus"></i> Add Channel</button></div>
        <div class="table-responsive"><table class="table table-striped table-bordered"><thead><tr><th>ID</th><th>Name</th><th>Stream URL</th><th>Category</th><th>Adult</th><th>Status</th><th>Actions</th></tr></thead><tbody>`;
        channels.forEach(ch => {
            html += `<tr>
                <td>${ch.channel_id}</td><td>${escapeHtml(ch.channel_name)}</td><td>${truncate(ch.stream_url,40)}</td>
                <td>${catMap[ch.category_id] || ''}</td><td>${ch.adult ? 'Yes' : 'No'}</td>
                <td><span class="badge bg-${ch.status==='Active'?'success':'secondary'} status-badge" style="cursor:pointer" onclick="toggleChannelStatus(${ch.channel_id}, '${ch.status}')">${ch.status}</span></td>
                <td><button class="btn btn-sm btn-warning" onclick="editChannel(${ch.channel_id})"><i class="fas fa-edit"></i></button> <button class="btn btn-sm btn-danger" onclick="deleteChannel(${ch.channel_id})"><i class="fas fa-trash"></i></button></td>
            </tr>`;
        });
        html += `</tbody></table></div>`;
        document.getElementById('channelsSection').innerHTML = html;
        const catSelect = document.getElementById('categoryId');
        if(catSelect) catSelect.innerHTML = categories.map(c=>`<option value="${c.category_id}">${escapeHtml(c.category_name)}</option>`).join('');
    }

    window.openChannelModal = function(channel=null) {
        document.getElementById('channelForm').reset();
        document.getElementById('channelId').value = '';
        if(channel) {
            document.getElementById('channelId').value = channel.channel_id;
            document.getElementById('channelName').value = channel.channel_name;
            document.getElementById('streamUrl').value = channel.stream_url;
            document.getElementById('logoUrl').value = channel.logo_url || '';
            document.getElementById('categoryId').value = channel.category_id || '';
            document.getElementById('epgChannelId').value = channel.epg_channel_id || '';
            document.getElementById('adult').checked = channel.adult;
            document.getElementById('status').value = channel.status;
        }
        new bootstrap.Modal(document.getElementById('channelModal')).show();
    };
    window.editChannel = async function(id) {
        const channels = await apiCall('/channels');
        const ch = channels.find(c=>c.channel_id == id);
        if(ch) openChannelModal(ch);
    };
    window.deleteChannel = async function(id) {
        if(confirm('Delete channel?')) { await apiCall(`/channels/${id}`, { method: 'DELETE' }); loadChannels(); loadDashboard(); }
    };
    window.toggleChannelStatus = async function(id, current) {
        const newStatus = current === 'Active' ? 'Inactive' : 'Active';
        await apiCall(`/channels/${id}`, { method: 'PUT', body: JSON.stringify({ status: newStatus }) });
        loadChannels();
    };
    document.getElementById('saveChannelBtn')?.addEventListener('click', async () => {
        const id = document.getElementById('channelId').value;
        const payload = {
            channel_name: document.getElementById('channelName').value,
            stream_url: document.getElementById('streamUrl').value,
            logo_url: document.getElementById('logoUrl').value,
            category_id: parseInt(document.getElementById('categoryId').value) || null,
            epg_channel_id: document.getElementById('epgChannelId').value,
            adult: document.getElementById('adult').checked,
            status: document.getElementById('status').value
        };
        if(id) await apiCall(`/channels/${id}`, { method: 'PUT', body: JSON.stringify(payload) });
        else await apiCall('/channels', { method: 'POST', body: JSON.stringify(payload) });
        bootstrap.Modal.getInstance(document.getElementById('channelModal')).hide();
        loadChannels(); loadDashboard();
    });

    // ---------- USERS ----------
    async function loadUsers() {
        const users = await apiCall('/users');
        let html = `<div class="d-flex justify-content-between mb-3"><h3>Users</h3><button class="btn btn-primary" onclick="openUserModal()"><i class="fas fa-plus"></i> Add User</button></div>
        <div class="table-responsive"><table class="table table-striped table-bordered"><thead><tr><th>ID</th><th>Username</th><th>Email</th><th>Bouquet ID</th><th>Expiry Date</th><th>Max Conn</th><th>Status</th><th>Actions</th></tr></thead><tbody>`;
        users.forEach(u => {
            html += `<tr>
                <td>${u.user_id}</td><td>${escapeHtml(u.username)}</td><td>${escapeHtml(u.email||'')}</td>
                <td>${u.bouquet_id||''}</td><td>${u.expiry_date ? new Date(u.expiry_date).toLocaleDateString() : 'Never'}</td>
                <td>${u.max_connections}</td>
                <td><span class="badge bg-${u.status==='Active'?'success':u.status==='Banned'?'danger':'secondary'} status-badge" style="cursor:pointer" onclick="toggleUserStatus(${u.user_id}, '${u.status}')">${u.status}</span></td>
                <td><button class="btn btn-sm btn-warning" onclick="editUser(${u.user_id})"><i class="fas fa-edit"></i></button> <button class="btn btn-sm btn-danger" onclick="deleteUser(${u.user_id})"><i class="fas fa-trash"></i></button></td>
            </tr>`;
        });
        html += `</tbody></table></div>`;
        document.getElementById('usersSection').innerHTML = html;
    }
    window.openUserModal = function(user=null) {
        document.getElementById('userForm').reset();
        document.getElementById('userId').value = '';
        document.getElementById('password').value = '';
        if(user) {
            document.getElementById('userId').value = user.user_id;
            document.getElementById('username').value = user.username;
            document.getElementById('email').value = user.email||'';
            document.getElementById('bouquetId').value = user.bouquet_id||'';
            if(user.expiry_date) {
                let d = new Date(user.expiry_date);
                let local = new Date(d.getTime() - d.getTimezoneOffset()*60000).toISOString().slice(0,16);
                document.getElementById('expiryDate').value = local;
            }
            document.getElementById('maxConnections').value = user.max_connections;
            document.getElementById('userStatus').value = user.status;
        } else {
            let defaultExpiry = new Date(Date.now() + 30*24*60*60*1000);
            let localExpiry = new Date(defaultExpiry.getTime() - defaultExpiry.getTimezoneOffset()*60000).toISOString().slice(0,16);
            document.getElementById('expiryDate').value = localExpiry;
        }
        new bootstrap.Modal(document.getElementById('userModal')).show();
    };
    window.editUser = async function(id) {
        const users = await apiCall('/users');
        const u = users.find(u=>u.user_id == id);
        if(u) openUserModal(u);
    };
    window.deleteUser = async function(id) {
        if(confirm('Delete user?')) { await apiCall(`/users/${id}`, { method: 'DELETE' }); loadUsers(); loadDashboard(); }
    };
    window.toggleUserStatus = async function(id, current) {
        let newStatus = current === 'Active' ? 'Banned' : (current === 'Banned' ? 'Active' : 'Active');
        await apiCall(`/users/${id}`, { method: 'PUT', body: JSON.stringify({ status: newStatus }) });
        loadUsers(); loadDashboard();
    };
    document.getElementById('saveUserBtn')?.addEventListener('click', async () => {
        const id = document.getElementById('userId').value;
        const payload = {
            username: document.getElementById('username').value,
            email: document.getElementById('email').value,
            bouquet_id: parseInt(document.getElementById('bouquetId').value) || null,
            expiry_date: document.getElementById('expiryDate').value ? new Date(document.getElementById('expiryDate').value).toISOString() : null,
            max_connections: parseInt(document.getElementById('maxConnections').value),
            status: document.getElementById('userStatus').value
        };
        const password = document.getElementById('password').value;
        if(password) payload.password = password;
        if(id) await apiCall(`/users/${id}`, { method: 'PUT', body: JSON.stringify(payload) });
        else await apiCall('/users', { method: 'POST', body: JSON.stringify(payload) });
        bootstrap.Modal.getInstance(document.getElementById('userModal')).hide();
        loadUsers(); loadDashboard();
    });

    // ---------- CATEGORIES ----------
    async function loadCategories() {
        const cats = await apiCall('/categories');
        let html = `<div class="d-flex justify-content-between mb-3"><h3>Categories</h3><button class="btn btn-primary" onclick="openCategoryModal()"><i class="fas fa-plus"></i> Add Category</button></div>
        <div class="table-responsive"><table class="table table-striped table-bordered"><thead><tr><th>ID</th><th>Name</th><th>Parent ID</th><th>Actions</th></tr></thead><tbody>`;
        cats.forEach(c => {
            html += `<tr><td>${c.category_id}</td><td>${escapeHtml(c.category_name)}</td><td>${c.parent_id}</td>
            <td><button class="btn btn-sm btn-warning" onclick="editCategory(${c.category_id})"><i class="fas fa-edit"></i></button> <button class="btn btn-sm btn-danger" onclick="deleteCategory(${c.category_id})"><i class="fas fa-trash"></i></button></td></tr>`;
        });
        html += `</tbody></table></div>`;
        document.getElementById('categoriesSection').innerHTML = html;
    }
    window.openCategoryModal = function(cat=null) {
        document.getElementById('categoryForm').reset();
        document.getElementById('categoryId').value = '';
        if(cat) {
            document.getElementById('categoryId').value = cat.category_id;
            document.getElementById('categoryName').value = cat.category_name;
            document.getElementById('parentId').value = cat.parent_id;
        }
        new bootstrap.Modal(document.getElementById('categoryModal')).show();
    };
    window.editCategory = async function(id) {
        const cats = await apiCall('/categories');
        const cat = cats.find(c=>c.category_id == id);
        if(cat) openCategoryModal(cat);
    };
    window.deleteCategory = async function(id) {
        if(confirm('Delete category?')) { await apiCall(`/categories/${id}`, { method: 'DELETE' }); loadCategories(); loadDashboard(); }
    };
    document.getElementById('saveCategoryBtn')?.addEventListener('click', async () => {
        const id = document.getElementById('categoryId').value;
        const payload = {
            category_name: document.getElementById('categoryName').value,
            parent_id: parseInt(document.getElementById('parentId').value) || 0
        };
        if(id) await apiCall(`/categories/${id}`, { method: 'PUT', body: JSON.stringify(payload) });
        else await apiCall('/categories', { method: 'POST', body: JSON.stringify(payload) });
        bootstrap.Modal.getInstance(document.getElementById('categoryModal')).hide();
        loadCategories(); loadDashboard();
    });

    // ---------- BOUQUETS ----------
    async function loadBouquets() {
        const bouqs = await apiCall('/bouquets');
        let html = `<div class="d-flex justify-content-between mb-3"><h3>Bouquets</h3><button class="btn btn-primary" onclick="openBouquetModal()"><i class="fas fa-plus"></i> Add Bouquet</button></div>
        <div class="table-responsive"><table class="table table-striped table-bordered"><thead><tr><th>ID</th><th>Name</th><th>Days</th><th>Max Streams</th><th>Price</th><th>Actions</th></tr></thead><tbody>`;
        bouqs.forEach(b => {
            html += `<tr><td>${b.bouquet_id}</td><td>${escapeHtml(b.bouquet_name)}</td><td>${b.days}</td><td>${b.max_streams}</td><td>$${b.price}</td>
            <td><button class="btn btn-sm btn-warning" onclick="editBouquet(${b.bouquet_id})"><i class="fas fa-edit"></i></button> <button class="btn btn-sm btn-danger" onclick="deleteBouquet(${b.bouquet_id})"><i class="fas fa-trash"></i></button></td></tr>`;
        });
        html += `</tbody></table></div>`;
        document.getElementById('bouquetsSection').innerHTML = html;
    }
    window.openBouquetModal = function(bouq=null) {
        document.getElementById('bouquetForm').reset();
        document.getElementById('bouquetId').value = '';
        if(bouq) {
            document.getElementById('bouquetId').value = bouq.bouquet_id;
            document.getElementById('bouquetName').value = bouq.bouquet_name;
            document.getElementById('days').value = bouq.days;
            document.getElementById('maxStreams').value = bouq.max_streams;
            document.getElementById('price').value = bouq.price;
        }
        new bootstrap.Modal(document.getElementById('bouquetModal')).show();
    };
    window.editBouquet = async function(id) {
        const bouqs = await apiCall('/bouquets');
        const b = bouqs.find(b=>b.bouquet_id == id);
        if(b) openBouquetModal(b);
    };
    window.deleteBouquet = async function(id) {
        if(confirm('Delete bouquet?')) { await apiCall(`/bouquets/${id}`, { method: 'DELETE' }); loadBouquets(); loadDashboard(); }
    };
    document.getElementById('saveBouquetBtn')?.addEventListener('click', async () => {
        const id = document.getElementById('bouquetId').value;
        const payload = {
            bouquet_name: document.getElementById('bouquetName').value,
            days: parseInt(document.getElementById('days').value),
            max_streams: parseInt(document.getElementById('maxStreams').value),
            price: parseFloat(document.getElementById('price').value)
        };
        if(id) await apiCall(`/bouquets/${id}`, { method: 'PUT', body: JSON.stringify(payload) });
        else await apiCall('/bouquets', { method: 'POST', body: JSON.stringify(payload) });
        bootstrap.Modal.getInstance(document.getElementById('bouquetModal')).hide();
        loadBouquets(); loadDashboard();
    });

    // ---------- NAVIGATION ----------
    function showSection(section) {
        ['dashboard','channels','users','categories','bouquets'].forEach(s => {
            const el = document.getElementById(s+'Section');
            if(el) el.style.display = s===section ? 'block' : 'none';
        });
        if(section === 'dashboard') loadDashboard();
        if(section === 'channels') loadChannels();
        if(section === 'users') loadUsers();
        if(section === 'categories') loadCategories();
        if(section === 'bouquets') loadBouquets();
        currentSection = section;
        document.querySelectorAll('.sidebar .nav-link').forEach(link => {
            if(link.getAttribute('data-section') === section) link.classList.add('active');
            else link.classList.remove('active');
        });
    }

    document.getElementById('sidebarToggle')?.addEventListener('click', () => document.getElementById('sidebar').classList.toggle('show'));
    document.querySelectorAll('.sidebar .nav-link').forEach(link => {
        link.addEventListener('click', (e) => {
            e.preventDefault();
            const section = link.getAttribute('data-section');
            if(section) showSection(section);
            if(window.innerWidth < 768) document.getElementById('sidebar').classList.remove('show');
        });
    });
    document.getElementById('logoutBtn')?.addEventListener('click', () => {
        localStorage.removeItem('token');
        alert('Logout not implemented – add Supabase auth later');
    });

    showSection('dashboard');
</script>
</body>
</html>
